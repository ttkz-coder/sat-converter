<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#faf9f6">
    <title>Satoshi & BTC Converter</title>
    
    <!-- ตั้งค่า Icon สำหรับ Add to Home Screen -->
    <link rel="apple-touch-icon" href="S icon.png">
    <link rel="icon" type="image/png" href="S icon.png">
    <meta name="apple-mobile-web-app-title" content="Satoshi">
    
    <!-- Tailwind & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #faf9f6;
            --primary-orange: #f59e0b;
            --primary-yellow: #fde047;
            --black: #111827;
            --white: #ffffff;
            --border-width: 3px;
            --shadow-color: #111827;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--bg-color);
            color: var(--black);
            background-image: radial-gradient(#d1d5db 1px, transparent 1px);
            background-size: 20px 20px;
            -webkit-tap-highlight-color: transparent;
        }

        .safe-padding {
            padding-top: max(1rem, env(safe-area-inset-top));
            padding-bottom: max(1rem, env(safe-area-inset-bottom));
        }

        .neo-card {
            background-color: var(--white);
            border: var(--border-width) solid var(--black);
            border-radius: 16px;
            box-shadow: 6px 6px 0px var(--shadow-color);
        }

        .neo-btn {
            background-color: var(--white);
            border: var(--border-width) solid var(--black);
            border-radius: 12px;
            box-shadow: 4px 4px 0px var(--shadow-color);
            font-weight: 700;
            transition: all 0.1s;
            cursor: pointer;
        }

        .neo-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--shadow-color);
        }

        .neo-btn-danger { background-color: #ef4444; color: var(--white); }

        /* ซ่อนลูกศรในช่อง Input */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .neo-input-group {
            display: flex;
            border: var(--border-width) solid var(--black);
            border-radius: 12px;
            background-color: var(--white);
            box-shadow: 4px 4px 0px var(--shadow-color);
            transition: all 0.1s ease-in-out;
            overflow: hidden;
        }
        
        .neo-input-group:focus-within {
            transform: translate(3px, 3px);
            box-shadow: 1px 1px 0px var(--shadow-color);
        }

        .input-icon-box {
            display: flex; align-items: center; justify-content: center;
            width: 60px; border-right: var(--border-width) solid var(--black); flex-shrink: 0;
        }

        .input-label-box {
            display: flex; align-items: center; justify-content: center;
            padding: 0 1rem; background-color: #f3f4f6;
            border-left: var(--border-width) solid var(--black);
            font-weight: 800; font-size: 0.875rem; color: var(--black); min-width: 80px;
        }

        .neo-input-field {
            flex-grow: 1; padding: 1rem; font-size: 1.25rem; font-weight: 700;
            outline: none; background: transparent; color: var(--black); width: 100%;
        }

        .status-dot {
            height: 12px; width: 12px; border-radius: 50%; display: inline-block; border: 2px solid var(--black);
        }
        .status-loading { background-color: var(--primary-yellow); animation: pulse 1.5s infinite; }
        .status-ready { background-color: #22c55e; }
        .status-error { background-color: #ef4444; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="min-h-[100dvh] flex flex-col items-center p-4 safe-padding">
    
    <div class="w-full max-w-2xl mt-4 md:mt-8">
        
        <header class="flex justify-between items-center mb-6 pb-4 border-b-[3px] border-black">
            <div class="flex items-center gap-3 md:gap-4">
                <div class="w-12 h-12 md:w-14 md:h-14 bg-yellow-400 rounded-xl border-[3px] border-black shadow-[4px_4px_0px_#111827] flex items-center justify-center">
                    <i class="fa-solid fa-calculator text-2xl md:text-3xl text-black"></i>
                </div>
                <div>
                    <h1 class="text-xl md:text-3xl font-extrabold leading-none tracking-tight">Converter</h1>
                    <span class="text-[10px] md:text-xs text-gray-500 font-bold tracking-[0.2em] uppercase">Satoshi & BTC</span>
                </div>
            </div>
            
            <div id="status-indicator" class="flex items-center gap-2 bg-white px-3 py-1.5 border-[3px] border-black rounded-lg shadow-[2px_2px_0px_#111827]">
                <span id="status-dot" class="status-dot status-loading"></span>
                <span id="status-text" class="text-xs md:text-sm font-bold">กำลังอัปเดต...</span>
            </div>
        </header>

        <div class="bg-black text-white rounded-xl border-[3px] border-black shadow-[4px_4px_0px_#f59e0b] p-4 mb-6 flex flex-col sm:flex-row justify-between items-center gap-2 relative overflow-hidden">
            <i class="fa-brands fa-bitcoin absolute -right-4 -bottom-6 text-7xl text-gray-800 opacity-50 rotate-12"></i>
            <div class="relative z-10 flex items-center gap-2">
                <i class="fa-solid fa-bolt text-yellow-400"></i>
                <span class="font-bold text-sm md:text-base text-gray-300">เรทปัจจุบัน:</span>
            </div>
            <div class="relative z-10 font-extrabold text-lg md:text-xl flex gap-4 text-yellow-400">
                <span>1 BTC = <span id="rate-usd" class="text-white">...</span></span>
                <span class="text-gray-600">|</span>
                <span><span id="rate-thb" class="text-white">...</span></span>
            </div>
        </div>

        <main class="neo-card p-5 md:p-8 space-y-6 bg-white">
            <h2 class="font-extrabold text-lg md:text-xl text-center mb-2">กรอกตัวเลขในช่องใดก็ได้</h2>

            <!-- Satoshi Input (เลขจำนวนเต็ม) -->
            <div class="space-y-1">
                <label class="block text-sm font-bold text-gray-600 ml-1">ซาโตชิ (Satoshi)</label>
                <div class="neo-input-group">
                    <div class="input-icon-box bg-yellow-400"><i class="fa-solid fa-coins text-xl"></i></div>
                    <input type="text" inputmode="numeric" id="satoshi-input" class="neo-input-field" placeholder="0">
                    <div class="input-label-box">SATS</div>
                </div>
            </div>

            <!-- BTC Input (เลขทศนิยม) -->
            <div class="space-y-1">
                <label class="block text-sm font-bold text-gray-600 ml-1">บิตคอยน์ (Bitcoin)</label>
                <div class="neo-input-group">
                    <div class="input-icon-box bg-orange-500"><i class="fa-brands fa-bitcoin text-2xl text-white"></i></div>
                    <input type="text" inputmode="decimal" id="btc-input" class="neo-input-field" placeholder="0.00">
                    <div class="input-label-box">BTC</div>
                </div>
            </div>

            <!-- THB Input (เลขทศนิยม) -->
            <div class="space-y-1">
                <label class="block text-sm font-bold text-gray-600 ml-1">เงินบาท (THB)</label>
                <div class="neo-input-group">
                    <div class="input-icon-box bg-blue-400"><span class="font-extrabold text-xl text-white">฿</span></div>
                    <input type="text" inputmode="decimal" id="thb-input" class="neo-input-field" placeholder="0.00">
                    <div class="input-label-box">THB</div>
                </div>
            </div>

            <!-- USD Input (เลขทศนิยม) -->
            <div class="space-y-1">
                <label class="block text-sm font-bold text-gray-600 ml-1">เงินดอลลาร์ (USD)</label>
                <div class="neo-input-group">
                    <div class="input-icon-box bg-green-500"><i class="fa-solid fa-dollar-sign text-xl text-white"></i></div>
                    <input type="text" inputmode="decimal" id="usd-input" class="neo-input-field" placeholder="0.00">
                    <div class="input-label-box">USD</div>
                </div>
            </div>

            <!-- Clear Button -->
            <div class="pt-4">
                <button onclick="clearAllInputs()" class="neo-btn neo-btn-danger w-full py-4 text-lg flex items-center justify-center gap-2">
                    <i class="fa-solid fa-trash-can"></i> ล้างข้อมูลทั้งหมด
                </button>
            </div>
        </main>
        
        <p class="text-center text-xs font-bold text-gray-400 mt-6 pb-8">ข้อมูลราคาจาก CoinGecko API</p>
    </div>

    <script>
        const SATOSHIS_PER_BTC = 100000000;
        let btcRates = { thb: 0, usd: 0 };
        let isCalculating = false;

        const satoshiInput = document.getElementById('satoshi-input');
        const btcInput = document.getElementById('btc-input');
        const thbInput = document.getElementById('thb-input');
        const usdInput = document.getElementById('usd-input');
        
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const rateUsdText = document.getElementById('rate-usd');
        const rateThbText = document.getElementById('rate-thb');

        // ฟังก์ชันลบลูกน้ำออกก่อนนำไปคำนวณ
        function unformatNumber(value) {
            return value.toString().replace(/,/g, '');
        }

        // ฟังก์ชันใส่ลูกน้ำ (Comma)
        function formatNumberWithCommas(value) {
            if (!value && value !== 0 && value !== '0') return '';
            let parts = value.toString().split('.');
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            return parts.join('.');
        }

        // ทำให้ช่อง Input ใส่ลูกน้ำอัตโนมัติขณะที่ผู้ใช้กำลังพิมพ์
        function addInputFormatting(inputElement) {
            inputElement.addEventListener('input', (e) => {
                let val = unformatNumber(e.target.value).replace(/[^0-9.]/g, '');
                
                // ป้องกันการพิมพ์จุดทศนิยมเกิน 1 ตัว
                const parts = val.split('.');
                if (parts.length > 2) {
                    val = parts[0] + '.' + parts.slice(1).join('');
                }
                
                const { selectionStart } = e.target;
                const originalLength = e.target.value.length;
                
                e.target.value = formatNumberWithCommas(val);
                
                const newLength = e.target.value.length;
                if (selectionStart !== null) {
                    let newCursorPos = selectionStart + (newLength - originalLength);
                    e.target.setSelectionRange(newCursorPos, newCursorPos);
                }
            });
        }

        addInputFormatting(satoshiInput);
        addInputFormatting(btcInput);
        addInputFormatting(thbInput);
        addInputFormatting(usdInput);

        function updateStatus(status) {
            statusDot.className = 'status-dot'; 
            switch (status) {
                case 'loading':
                    statusDot.classList.add('status-loading');
                    statusText.textContent = 'กำลังอัปเดต...';
                    statusText.className = 'text-xs md:text-sm font-bold text-gray-700';
                    break;
                case 'ready':
                    statusDot.classList.add('status-ready');
                    statusText.textContent = 'ออนไลน์';
                    statusText.className = 'text-xs md:text-sm font-bold text-green-600';
                    break;
                case 'error':
                    statusDot.classList.add('status-error');
                    statusText.textContent = 'ออฟไลน์';
                    statusText.className = 'text-xs md:text-sm font-bold text-red-600';
                    break;
            }
        }

        async function fetchCryptoPrices() {
            updateStatus('loading');
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=thb,usd');
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();
                if (data.bitcoin && data.bitcoin.thb && data.bitcoin.usd) {
                    btcRates.thb = data.bitcoin.thb;
                    btcRates.usd = data.bitcoin.usd;
                    
                    rateUsdText.textContent = '$' + btcRates.usd.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                    rateThbText.textContent = '฿' + btcRates.thb.toLocaleString('th-TH', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                    
                    updateStatus('ready');
                    triggerRecalculation();
                } else { throw new Error("Invalid format"); }
            } catch (error) {
                updateStatus('error');
            }
        }

        function triggerRecalculation() {
            if (btcInput.value !== '') handleInput({ target: btcInput }, 'btc');
            else if (satoshiInput.value !== '') handleInput({ target: satoshiInput }, 'satoshi');
            else if (thbInput.value !== '') handleInput({ target: thbInput }, 'thb');
            else if (usdInput.value !== '') handleInput({ target: usdInput }, 'usd');
        }

        function clearAllInputs() {
            satoshiInput.value = ''; btcInput.value = '';
            thbInput.value = ''; usdInput.value = '';
        }

        function handleInput(e, sourceUnit) {
            if (isCalculating) return;
            isCalculating = true;

            const valueStr = unformatNumber(e.target.value);
            if (valueStr === '') {
                clearAllInputs();
                isCalculating = false;
                return;
            }

            const value = parseFloat(valueStr);
            if (isNaN(value)) { isCalculating = false; return; }

            let satoshi = 0, btc = 0, thb = 0, usd = 0;

            try {
                switch (sourceUnit) {
                    case 'satoshi':
                        satoshi = value; btc = satoshi / SATOSHIS_PER_BTC;
                        thb = btc * btcRates.thb; usd = btc * btcRates.usd;
                        break;
                    case 'btc':
                        btc = value; satoshi = btc * SATOSHIS_PER_BTC;
                        thb = btc * btcRates.thb; usd = btc * btcRates.usd;
                        break;
                    case 'thb':
                        if (btcRates.thb === 0) { isCalculating = false; return; }
                        thb = value; btc = thb / btcRates.thb;
                        satoshi = btc * SATOSHIS_PER_BTC; usd = btc * btcRates.usd;
                        break;
                    case 'usd':
                        if (btcRates.usd === 0) { isCalculating = false; return; }
                        usd = value; btc = usd / btcRates.usd;
                        satoshi = btc * SATOSHIS_PER_BTC; thb = btc * btcRates.thb;
                        break;
                }

                // ใส่ลูกน้ำอัตโนมัติให้ช่องอื่น ๆ ที่ถูกคำนวณ
                if (sourceUnit !== 'satoshi') satoshiInput.value = formatNumberWithCommas(satoshi.toFixed(0)); 
                if (sourceUnit !== 'btc') btcInput.value = formatNumberWithCommas(btc.toFixed(8));
                if (sourceUnit !== 'thb') thbInput.value = formatNumberWithCommas(thb.toFixed(2));
                if (sourceUnit !== 'usd') usdInput.value = formatNumberWithCommas(usd.toFixed(2));

            } catch (err) { console.error("Calculation error:", err); }

            isCalculating = false;
        }

        satoshiInput.addEventListener('input', (e) => handleInput(e, 'satoshi'));
        btcInput.addEventListener('input', (e) => handleInput(e, 'btc'));
        thbInput.addEventListener('input', (e) => handleInput(e, 'thb'));
        usdInput.addEventListener('input', (e) => handleInput(e, 'usd'));

        document.addEventListener('DOMContentLoaded', fetchCryptoPrices);
        setInterval(fetchCryptoPrices, 120000); // 2 mins

    </script>
</body>
</html>
